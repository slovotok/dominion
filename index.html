<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DOMINION</title>
<link rel="stylesheet" href="style.css" />
<link rel="manifest" href="manifest.json" />
</head>
<body>

<header>
  <h1>DOMINION</h1>
  <div id="date"></div>
</header>

<main>

<section class="card">
  <h2>Execution</h2>
  <div class="grid">
    <div>
      <label>Ruch</label>
      <input type="number" id="ruch" min="1" max="10">
    </div>
    <div>
      <label>Nauka</label>
      <input type="number" id="nauka" min="1" max="10">
    </div>
    <div>
      <label>Języki</label>
      <input type="number" id="jezyki" min="1" max="10">
    </div>
    <div>
      <label>Tworzenie</label>
      <input type="number" id="tworzenie" min="1" max="10">
    </div>
    <div>
      <label>Inwestowanie</label>
      <input type="number" id="inwest" min="1" max="10">
    </div>
  </div>
</section>

<section class="card">
  <h2>Mental</h2>
  <div class="grid">
    <div>
      <label>Energia</label>
      <input type="number" id="energia" min="1" max="10">
    </div>
    <div>
      <label>Dyscyplina</label>
      <input type="number" id="dyscyplina" min="1" max="10">
    </div>
  </div>
</section>

<section class="card">
  <h2>Score</h2>
  <div id="score">0</div>
  <button onclick="saveDay()">Zapisz dzień</button>
</section>

<section class="card">
  <h2>Trend (7 dni)</h2>
  <canvas id="chart"></canvas>
</section>

<section class="card">
  <button onclick="exportData()">Eksport danych</button>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
